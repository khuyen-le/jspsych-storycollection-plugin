<!DOCTYPE html>
<html>
  <head>
    <title>jsPsychStorycollection Example</title>
    <script src="https://unpkg.com/jspsych"></script>
    <!-- Once this plugin package is published, you can load it from a CDN instead:
<script src="https://unpkg.com/plugin-storycollection"></script> -->
    <script src="../dist/index.browser.min.js"></script>
    <script src="../dist/extension-progress.browser.min.js"></script>
    <link rel="stylesheet" href="https://unpkg.com/jspsych/css/jspsych.css" />
  </head>

  <body></body>
  <script>
    /* initialize jsPsych */
    const jsPsych = initJsPsych({
      show_progress_bar: true,
      extensions: [{ 
        type: jsPsychExtensionProgress, 
        params: {
          show_progress_bar: true,
          total_pages: 1,
          pages_completed: 0,
          celebration_sound: null,
          celebration_message: '⭐  Great job!  ⭐',
          star_symbol: '★',
          star_color: '#FFD700',
          star_size: 38,
          // Add any parameters for the progress extension here
        }
       }],
      on_finish: function() {
        jsPsych.data.displayData();
      }
    });
    
    const trial = {
      type: jsPsychStorycollection,
      extensions: [{ 
        type: jsPsychExtensionProgress, 
        params: {
          show_progress_bar: true,
          total_pages: 1,
          pages_completed: 0,
          celebration_sound: null,
          celebration_message: '⭐  Great job!  ⭐',
          star_symbol: '★',
          star_color: '#FFD700',
          star_size: 38,
          // Add any parameters for the progress extension here
        }
       }],
      response_allowed_while_playing: true,
      previous_button: {
        button_text: "Previous",
        button_visible: true
      },
      next_button: {
        button_text: "Next",
        button_visible: true
      },
      replay_button: {
        button_text: "Replay",
        button_visible: true
      }, 
      pages: [
        {
          background_image: "img/background.jpeg",
          images: [{ id: "arlo", src: "img/arlo.png", x_pos: 20, y_pos: 20, width: 20, time_onset: 0, duration: 5000 },
                  { id: "arlo-hi", src: "img/arlo-hi.png", x_pos: 20, y_pos: 20, width: 20, time_onset: 5000, duration: 2000 }],
          width: 70, 
          highlight: [{
            image_id: "arlo",
            style: "5px solid green",
            time_onset: 1000,
            duration: 3000
          }], 
        },
        {
          background_image: "img/background.jpeg",
          images: [{ id: "arlo", src: "img/arlo.png", x_pos: 20, y_pos: 20, width: 20, time_onset: 0, duration: 5000 },
                  { id: "arlo-hi", src: "img/arlo-hi.png", x_pos: 20, y_pos: 20, width: 20, time_onset: 5000, duration: 2000 }],
          width: 70, 
          audio: [
            { src: "sound/ready.mp3", time_onset: 0 },
            { src: "sound/chimes.mp3", time_onset: 2500 },
            { src: "sound/arlo-hi.mp3", time_onset: 5000 },
          ],
        }, 
        {
          background_image: "img/background.jpeg",
          images: [{ id: "arlo", src: "img/arlo.png", x_pos: 20, y_pos: 20, width: 20, time_onset: 0, duration: 5000 },
                  { id: "arlo-hi", src: "img/arlo-hi.png", x_pos: 20, y_pos: 20, width: 20, time_onset: 5000, duration: 2000 }],
          width: 70, 
          audio: [
            { src: "sound/ready.mp3", time_onset: 0 },
            { src: "sound/chimes.mp3", time_onset: 2500 },
            { src: "sound/sarah-hi.mp3", time_onset: 5000 },
          ],
        }, 
      ]
    };

    jsPsych.run([trial])
  </script>
</html>
